services:
  jellyseerr:
    image: fallenbagel/jellyseerr
    container_name: jellyseerr
    environment:
      - TZ=America/Toronto
    ports:
      - 5055:5055
    volumes:
      - jellyseerr-config:/app/config
    networks:
      - media
    restart: unless-stopped

volumes:
  jellyseerr-config:

networks:
  media:
    external: true
