# https://recyclarr.dev/wiki/yaml/config-reference/
# Run `docker exec recyclarr recyclarr sync` to apply profiles
#
# Quality profiles aligned with TRaSH Guides recommendations
# https://trash-guides.info

sonarr:
  sonarr:
    base_url: http://sonarr:8989
    api_key: !env_var SONARR_API_KEY

    quality_definition:
      type: series

    quality_profiles:
      - name: 1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: WEBDL-1080p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: WEBDL-1080p
          - name: WEBRip-1080p

      - name: 2160p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: WEBDL-2160p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: WEBDL-2160p
          - name: WEBRip-2160p

      - name: Best up to 1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: WEBDL-1080p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: WEBDL-1080p
          - name: WEBRip-1080p
          - name: WEBDL-720p
          - name: WEBRip-720p

      - name: Best up to 2160p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: WEBDL-2160p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: WEBDL-2160p
          - name: WEBRip-2160p
          - name: WEBDL-1080p
          - name: WEBRip-1080p
          - name: WEBDL-720p
          - name: WEBRip-720p

    custom_formats:
      # Unwanted - applied to all profiles
      - trash_ids:
          - 85c61753df5da1fb2aab6f2a47426b09 # BR-DISK
          - 9c11cd3f07101cdba90a2d81cf0e56b4 # LQ
          - e2315f990da2e2cbfc9fa5b7a6fcfe48 # LQ (Release Title)
          - fbcb31d8dabd2a319072b84fc0b7249c # Extras
          - 15a05bc7c1a36e2b57fd628f8977e2fc # AV1
        assign_scores_to:
          - name: 1080p
          - name: 2160p
          - name: Best up to 1080p
          - name: Best up to 2160p

      # x265 (HD) - penalize x265 on non-4K profiles only
      - trash_ids:
          - 47435ece6b99a0b477caf360e79ba0bb # x265 (HD)
        assign_scores_to:
          - name: 1080p
          - name: Best up to 1080p

      # Repack/Proper
      - trash_ids:
          - ec8fa7296b64e8cd390a1600981f3923 # Repack/Proper
          - eb3d5cc0a2be0db205fb823640db6a3c # Repack v2
          - 44e7c4de10ae50265753082e5dc76047 # Repack v3
        assign_scores_to:
          - name: 1080p
          - name: 2160p
          - name: Best up to 1080p
          - name: Best up to 2160p

      # Streaming Services (scored 75 for Sonarr per TRaSH)
      - trash_ids:
          - d660701077794679fd59e8bdf4ce3a29 # AMZN
          - f67c9ca88f463a48346062e8ad07713f # ATVP
          - 77a7b25585c18af08f60b1547bb9b4fb # CC
          - 36b72f59f4ea20aad9316f475f2d9fbb # DCU
