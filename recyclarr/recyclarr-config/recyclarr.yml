          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
        assign_scores_to:
          - name: 1080p
          - name: 2160p
          - name: Best up to 1080p
          - name: Best up to 2160p

      # HDR Formats - 2160p profiles only
      - trash_ids:
          - 505d871304820ba7106b693be6fe4a9e # HDR
          - 7c3a61a9c6cb04f52f1544be6d44a026 # DV Boost
          - 0c4b99df9206d2cfac3c05ab897dd62a # HDR10+ Boost
        assign_scores_to:
          - name: 2160p
          - name: Best up to 2160p

      # DV (w/o HDR fallback) block - 2160p profiles only
      - trash_ids:
          - 9b27ab6498ec0f31a3353992e19434ca # DV (w/o HDR fallback)
        assign_scores_to:
          - name: 2160p
          - name: Best up to 2160p

      # x265 (no HDR/DV) block - 2160p profiles only
      - trash_ids:
          - 9b64dff695c2115facf1b6ea59c9bd07 # x265 (no HDR/DV)
        assign_scores_to:
          - name: 2160p
          - name: Best up to 2160p

      # SDR block - 2160p profiles only (allows SDR WEB-DL as fallback)
      - trash_ids:
          - 83304f261cf516bb208c18c54c0adf97 # SDR (no WEBDL)
        assign_scores_to:
          - name: 2160p
          - name: Best up to 2160p

