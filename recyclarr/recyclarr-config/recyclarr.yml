          - 43b3cf48cb385cd3eac608ee6bca7f09 # UHD Streaming Boost
          - 218e93e5702f44a68ad9e3c6ba87d2f0 # HD Streaming Boost
        assign_scores_to:
          - name: 2160p
          - name: Best up to 2160p

      # HQ Source Groups - WEB Tiers for all profiles
      - trash_ids:
          - e6258996055b9fbab7e9cb2f75819294 # WEB Tier 01
          - 58790d4e2fdcd9733aa7ae68ba2bb503 # WEB Tier 02
          - d84935abd3f8556dcd51d4f27e22d0a6 # WEB Tier 03
          - d0c516558625b04b363fa6c5c2c7cfd4 # WEB Scene
        assign_scores_to:
          - name: 1080p
          - name: 2160p
          - name: Best up to 1080p
          - name: Best up to 2160p

      # Season Pack - prefer season packs over single episodes
      - trash_ids:
          - 3bc5f395426614e155e585a2f056cdf1 # Season Pack
        assign_scores_to:
          - name: 1080p
          - name: 2160p
          - name: Best up to 1080p
          - name: Best up to 2160p

      # Optional Unwanted - applied to all profiles
