          - f6cce30f1733d5c8194222a7507909bb # Hulu
          - 0ac24a2a68a9700bcb7eeca8e5cd644c # iT
          - 81d1fbf600e2540cee87f3a23f9d3c1c # MAX
          - d34870697c9db575f17700212167be23 # NF
          - 1656adc6d7bb2c8cca6acfb6592db421 # PCOK
          - c67a75ae4a1715f2bb4d492755ba4195 # PMTP
          - ae58039e1319178e6be73caab5c42166 # SHO
          - 1efe8da11bfd74fbbcd4d8117ddb9213 # STAN
          - 9623c5c9cac8e939c1b9aedd32f640bf # SYFY
        assign_scores_to:
          - name: 1080p
          - name: 2160p
          - name: Best up to 1080p
          - name: Best up to 2160p

      # HD Streaming Boost - for 1080p profiles
      - trash_ids:
          - 218e93e5702f44a68ad9e3c6ba87d2f0 # HD Streaming Boost
        assign_scores_to:
          - name: 1080p
          - name: Best up to 1080p

      # UHD + HD Streaming Boost - for 2160p profiles
