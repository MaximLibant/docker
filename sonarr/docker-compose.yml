services:
  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=99
      - PGID=100
      - TZ=${TZ:-America/Toronto}
    ports:
      - 8989:8989
    volumes:
      - sonarr-config:/config
      - /mnt/media/library:/data
    networks:
      - media
    restart: unless-stopped

volumes:
  sonarr-config:

networks:
  media:
    external: true
