services:
  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=99
      - PGID=100
      - TZ=${TZ:-America/Toronto}
    ports:
      - 8989:8989
    volumes:
      - ./sonarr-config:/config
      - /mnt/media/library/tvshows:/tvshows
      - /mnt/media/library/downloads:/downloads
      - /mnt/media/library/completed:/completed
    networks:
      - media
    restart: unless-stopped

networks:
  media:
    external: true
